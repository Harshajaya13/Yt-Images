<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallhaven Style Gallery</title>
    <style>
        /* Wallhaven-style Dark Theme */
        :root {
            --bg-color: #131313;
            --card-bg: #222;
            --text-main: #eeeeee;
            --accent-color: #00bcd4; /* A nice cyan accent */
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Responsive Grid layout */
        .gallery-container {
            display: grid;
            /* Creates a responsive grid where columns are at least 300px wide */
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Image Card Styling */
        .image-card {
            position: relative;
            margin: 0;
            overflow: hidden;
            border-radius: 4px;
            background-color: var(--card-bg);
            /* Forces a 16:9 aspect ratio like typical wallpapers */
            aspect-ratio: 16 / 9; 
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
        }

        /* The Image itself */
        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures images fill the box without squishing */
            transition: transform 0.3s ease;
        }

        /* Wallhaven Hover Zoom Effect */
        .image-card:hover img {
            transform: scale(1.08);
        }

        /* The Overlay/Description section */
        .image-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px 15px 10px 15px;
            /* Dark gradient from bottom up for text readability */
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0) 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0; /* Hidden by default */
            transition: opacity 0.3s ease;
        }

        /* Show info on hover */
        .image-card:hover .image-info {
            opacity: 1;
        }

        /* Description Text Styling */
        .image-desc {
            font-size: 1rem;
            font-weight: 600;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .image-tag {
            font-size: 0.8rem;
            background-color: rgba(255, 255, 255, 0.2);
            padding: 2px 6px;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <main class="gallery-container" id="gallery"></main>

    <script>
        // Grab the container from the HTML
        const gallery = document.getElementById('gallery');

        // Loop 15 times to generate the 15 images
        for (let i = 1; i <= 15; i++) {
            
            // 1. Create the container card
            const card = document.createElement('figure');
            card.className = 'image-card';
            
            // 2. Create the image element
            const img = document.createElement('img');
            img.src = `${i}.jpeg`; // Loads 1.jpeg, 2.jpeg, etc.
            img.alt = `Wallpaper ${i}`;
            img.loading = "lazy"; // Helps the page load faster
            
            // 3. Create the info overlay (appears on hover)
            const info = document.createElement('div');
            info.className = 'image-info';
            
            // 4. Create the description text
            const desc = document.createElement('span');
            desc.className = 'image-desc';
            desc.textContent = `Image ${i}`; // The description text

            // Optional: Add a little tag like Wallhaven has
            const tag = document.createElement('span');
            tag.className = 'image-tag';
            tag.textContent = `JPG`;
            
            // Assemble the pieces together
            info.appendChild(desc);
            info.appendChild(tag);
            card.appendChild(img);
            card.appendChild(info);
            
            // Put the finished card into the gallery
            gallery.appendChild(card);
        }
    </script>
</body>
</html>
